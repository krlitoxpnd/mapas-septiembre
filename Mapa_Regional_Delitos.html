<script>
    function toggleSidebar() {
        var sidebar = document.querySelector('.leaflet-control-layers');
        var boton = document.getElementById('toggle-sidebar');
        var body = document.querySelector('body');
        sidebar.classList.toggle('sidebar-plegada');
        boton.classList.toggle('boton-plegado');
        body.classList.toggle('sidebar-plegada-activa');
        boton.innerText = sidebar.classList.contains('sidebar-plegada') ? 'Ver Menú' : 'Plegar Menú';
        setTimeout(function(){ window.dispatchEvent(new Event('resize')); }, 310);
    }

    document.addEventListener("DOMContentLoaded", function() {
        var layersControl = document.querySelector('.leaflet-control-layers-overlays');
        var labels = Array.from(layersControl.querySelectorAll('label'));
        layersControl.innerHTML = '<div style="text-align: center; border-bottom: 2px solid white; margin-bottom: 20px; padding-bottom:10px;">' +
                                  '<h3 style="margin:0; font-size:16px;">Mapa Regional</h3>' +
                                  '<h4 style="margin:5px 0 0 0; font-size:12px; opacity:0.8;">Análisis del Delito</h4></div>';

        function crearCategoria(filtros, nombreVisible, esDesplegable) {
            var contenedor = document.createElement('div');
            contenedor.className = 'seccion-contenedor' + (esDesplegable ? ' colapsado' : '');
            var header = document.createElement('div');
            header.className = 'seccion-header';
            var chkPadre = document.createElement('input');
            chkPadre.type = 'checkbox';
            chkPadre.className = 'checkbox-maestro';
            var titulo = document.createElement('div');
            titulo.className = 'seccion-titulo-texto';
            titulo.innerText = nombreVisible;
            var flecha = document.createElement('span');
            flecha.className = 'flecha';
            flecha.innerText = '▼';
            header.appendChild(chkPadre);
            header.appendChild(titulo);
            if(esDesplegable) header.appendChild(flecha);
            var cuerpo = document.createElement('div');
            cuerpo.className = 'grupo-contenido' + (esDesplegable ? ' oculto' : '');
            
            var items = labels.filter(l => filtros.some(f => l.innerText.includes(f)));
            items.forEach(l => cuerpo.appendChild(l));
            
            if(items.length > 0) {
                layersControl.appendChild(contenedor);
                contenedor.appendChild(header);
                contenedor.appendChild(cuerpo);
                titulo.onclick = function() { if(esDesplegable) { cuerpo.classList.toggle('oculto'); contenedor.classList.toggle('colapsado'); } };
                chkPadre.onchange = function() { var estado = this.checked; cuerpo.querySelectorAll('input').forEach(c => { if(c.checked !== estado) c.click(); }); };
            }
        }

        // NUEVO: Creamos la sección del mapa de calor arriba de todo de manera independiente (fijo, sin colapsar)
        crearCategoria(["🔥"], "Herramientas de Densidad", false);

        // Secciones tradicionales de Municipios por meses
        crearCategoria(["🔴"], "Lobería", true);
        crearCategoria(["🟢"], "San Cayetano", true);
        crearCategoria(["🔵"], "Necochea", true);
    });
</script>

                var html_5d43fe59d3b3c49eaec17c9503b8cede = $(`<div id="html_5d43fe59d3b3c49eaec17c9503b8cede" style="width: 100.0%; height: 100.0%;">             <div style='font-family: Arial, sans-serif; width: 260px; color: #333;'>                 <h3 style='color: red; margin-bottom: 0; font-size: 16px;'>Información del Hecho</h3>                 <hr style='border: 0; border-top: 1px solid #ccc; margin: 5px 0 10px 0;'>                 <table style='width: 100%; font-size: 12px; border-collapse: collapse;'>                     <tr><td style='padding: 2px;'><b>Fecha:</b></td><td>2026-06-18</td></tr>                     <tr><td style='padding: 2px;'><b>Hora:</b></td><td>22:00:00</td></tr>                     <tr><td style='padding: 2px;'><b>Dirección:</b></td><td>GRAL LAMADRID 720</td></tr>                     <tr><td style='padding: 2px;'><b>Tipo:</b></td><td>S/D</td></tr>                 </table>                 <div style='margin-top: 10px;'>                     <b style='font-size: 12px;'>Detalle del Hecho:</b>                     <div style='margin-top: 5px; padding: 10px; border: 1px solid #aaa; background-color: #f9f9f9;                                  font-style: italic; font-size: 11px; max-height: 100px; overflow-y: auto; line-height: 1.4;'>                         "En la ciudad de Loberia, partido del mismo nombre, Provincia de Buenos Aires, Republica Argentina, Jurisdiccion de la Estacion de Policia Comunal Loberia, a los dieciocho dias del mes de Junio del Año dos mil veintiseis, siendo aproximadamente las 22:20 horas, la Oficial Subinspector Julieta SOSA, el Teniente Javier QUERAN y la Subteniente Yamila TOLEDO, a bordo del movil identificable N° 30846, se encontraban realizando recorridas preventivas por el ejido urbano, cuando al circular por calle Lamadrid y arribar a calle Barreira, observaron a tres sujetos masculinos desplazandose a pie por la via publica, llamando particularmente la atencion que uno de ellos transportaba sobre sus hombros un HORNO ELECTRICO DE ACERO INOXIDABLE COLOR GRIS, circunstancia poco habitual para el horario y lugar en cuestion. Ante ello, y a los fines de adoptar los recaudos de seguridad, solicitaron mediante equipo de comunicacion el apoyo del movil N° 30907, a cargo del Teniente David ROMERO y el Teniente Damian MALDONADO, por lo que una vez reunidos ambos moviles y contando con personal suficiente para llevar a cabo la identificacion, procedieron a realizarlo en la interseccion de calles Lamadrid y Flores. Que de esta forma y al descender de los moviles, los efectivos reconocieron inmediatamente a los tres individuos como 1) Ayrton TAYLOR, 2) Steven HAUSCARRIAGUE y 3) Javier RIOS, personas conocidas en el ambito policial. Por lo que en principios consultado el motivo por el cual transportaban dicho electrodomestico, manifestaron que provenian de la vivienda de un familiar. En particular, Javier RIOS, quien llevaba el horno, refirio que el mismo pertenecia a una hermana suya y que lo trasladaba hacia la casa de otro familiar, donde mantendrian una reunion para cenar. Que si bien las explicaciones brindadas resultaban razonablemente creibles y al no observar en principio otro elemento que demuestre lo contrario, el personal decidio tomar nota de ello, permitiendo posteriormente que continuaran su recorrido. Acto seguido, ambos moviles retomaron las recorridas preventivas y, tras recorrer aproximadamente doscientos metros por calle Lamadrid, observaron una vivienda ubicada en la interseccion con calle Saenz que presentaba claros signos de haber sido violentada, concretamente, se advirtio una ventana rota y un importante desorden visible desde el Calle: En virtud de ello, los efectivos descendieron de las unidades y realizaron una inspeccion visual por fuera del inmueble, constatando la existencia de daños en el interior, por lo que en ese momento, la Inspectora Julieta SOSA, quien si bien se hallaba realizando tareas preventivas, ademas cumple funciones como Oficial de Servicio y conocia al propietario de la finca, recordando haber recepcionado en oportunidades anteriores denuncias vinculadas a conflictos persistentes entre los sujetos identificados momentos antes y el morador del lugar, de nombre Carlos TELECHEA. Que por ese motivo, establecio comunicacion telefonica desde su abonado particular con el propietario del inmueble, al numero (2262-238638), el cual poseia consiguio debido a denuncias previas y al ser atendida por el señor TELECHEA, este manifesto que se habia retirado de la vivienda alrededor de las 17:00 horas, dejando la misma en perfectas condiciones y sin anomalias., por lo que al informarle sobre los daños constatados, fue consultado acerca de la existencia de un horno electrico de color gris en el interior de la finca, respondiendo que si poseia uno de ellos: Seguidamente, los efectivos verificaron por la ventana dañada que dicho elemento no se hallaba en la cocina, lugar donde habitualmente se encuentra, circunstancia que reforzo inmediatamente la sospecha de que el horno transportado por Javier RIOS podria corresponder al sustraido momentos antes: Ante lo cual, ambos moviles iniciaron una recorrida con el claro objetivo de localizar nuevamente a los tres sujetos identificados, logrando dar con los mismo a las 22:36 horas, observandolo desplazarse a pie por calla Avellaneda entre Las Heras y Moreno: Tal es asi que inmediatamente los efectivos descendieron de las unidades e impartieron las directivas para proceder a su identificacion, ordenandoles colocar sus manos sobre los moviles policiales. Mientras Ayrton TAYLOR y Steven HAUSCARRIAGUE acataron inicialmente las ordenes impartidas, Javier RIOS adopto una actitud hostil y desafiante, expresando a viva voz: SIC A mi dejenme en paz, nadie me va a meter preso. Frente a ello, el personal inicio con la persuasion verbal, intentando lograr la colaboracion de este y asi poder efectuar un cacheo superficial y preventivo, destinado a dirimir cualquier riesgo para la integridad fisica propia o de terceros. Sin embargo, al advertir que RIOS continuaba con una postura negativa y desobedecia las directivas impartidas, los efectivos avanzaron algunos pasos con la intencion de tomar contacto fisico y asegurar la situacion. Que en ese momento cuando Steven HAUSCARRIAGUE, quien hasta entonces permanecia con las manos apoyadas sobre el patrullero, giro bruscamente y extrajo desde la zona de su cintura un ARMA BLANCA, comenzando a esgrimirla en direccion al personal policial. Mientras apuntaba con la misma hacia los uniformados, profirio amenazas a viva voz, refiriendo SIC: Suelten a mi hermano porque los corto a todos, en clara referencia a Javier RIOS, agregando ademas expresiones las cuales manifestaba su intencion de agredir a los efectivos si continuaban con el procedimiento. Que por este motivo, la situacion genero un cambio en la prioridad de los uniformados, ya que la totalidad del personal puso toda su atencion en neutralizar la amenaza representada por HAUSCARRIAGUE y de este modo, aprovechando dicha circunstancia, Javier RIOS emprendio la fuga a pie a gran velocidad, perdiendose de vista por calles las Heras, lanzando piedras hacia los patrulleros en su huida, sin lograr impactar en ellos. No obstante, los efectivos continuaron focalizados en la reduccion de HAUSCARRIAGUE, por lo que mediante ordenes verbales y aprovechando un instante de distraccion del mismo, lograron acortar rapidamente distancia, sujetando el brazo con el que empuñaba el arma blanca y logran reducirlo, que asi, consiguieron despojarlo del arma y colocarle un juego de esposas para su contencion. Que paralelamente, Ayrton TAYLOR fue reducido sin necesidad de emplear fuerza alguna, procediendose igualmente a su esposamiento: Finalmente, teniendo en cuenta que el procedimiento se desarrollaba a escasos metros de una vivienda perteneciente a familiares de Javier RIOS, sumado a que este habia logrado darse a la fuga momentos antes, existiendo asi la posibilidad de que regresara acompañado por terceros con la intencion de entorpecer el accionar policial o peor aun, favorecer la liberacion de HAUSCARRIAGUE, y considerando ademas la escasa circulacion de personas y vehiculos en horario que acontecieron los hechos, el personal resolvio priorizar la seguridad propia y del procedimiento, decidiendo trasladar de inmediato a los aprehendidos a las unidades policiales y de alli, hacia la estacion de Policia Comunal Loberia, dandosele lectura a viva voz de los derechos conferidos por el articulo 60 del CPP. Que por todo ello, atento a la urgencia que demandaba el procedimiento, se procedio al SECUESTRO de: 1) Un cuchillo de unos 15 centimetros, tipo corta pluma, con su cabo de material simil hueso y hoja cual reza “Tramontina Stainless – Brasil” – 2) Horno electrico de color gris, material acero inoxidable, marca Peabody, cual posee el faltante de dos perillas, SIN la presencia de un testigo habil de actuacion: Por otro lado y una vez en la dependencia policial, y encontrandose la situacion plenamente controlada, el Subteniente Damian MALDONADO procedio a efectuar nuevamente un cacheo superficial preventivo sobre los aprehendidos, ello en resguardo de la integridad fisica del personal policial y al palpar la zona de la cintura de Ayrton TAYLOR, se constato la presencia de un elemento solido oculto entre sus prendas de vestir, motivo por el cual se procedio a su inmediata extraccion, resultando ser un 3) Cuchillo de aproximadamente 15 centimetros de longitud, con hoja metalica de color gris oscuro y sin marca visible, procediendose a su SECUESTRO Por tal razon, habiendo infringido prima facie la infraccion prevista y reprimida por el Articulo 42 del Decreto Ley 8031/73, sera notificado separadamente del inicio de actuaciones contravencionales, dandosele inmediata lectura de los derechos y garantias que le confieren el Articulo 60 del Codigo Procesal Penal y el Articulo 16 de la Ley 13.482. No obstante se procede a la correcta identificacion de los causados quien dicen ser y llamarse: 1) Ayrton David TAYLOR EULOGIO, Argentino, instruido, soltero, de 26 Años, DNI. Nro. 41.800.490, hijo de Don Regino y Doña Maria EULOGIO 2) Leonel Steven HAUSCARRIAGUE, Argentino, instruido, soltero, nacido en la Ciudad de Loberia el 28/08/2006, poseedor de dni.47.640.504 y el tercer sujeto que logra huir 3) Ricardo Javier RIOS, argentino, instruido, soltero, albañil, de 34 años de edad, hijo de Don Ricardo Emir (v) y de Doña Marcela Silvana MORALES (v), nacido en Loberia el 16/06/1992, titular del D.N.I. Nro. 36.773.036 Que siendo las 23:05 horas, el titular de la dependencia policial, Subcomisario Angel MALDONADO, mantuvo comunicacion telefonica con la Dra. Vanesa SCHNEIDER, titular de la Ayudantia Fiscal de Loberia, quien interiorizada de los pormenores, avalo las Aprehensiones practicadas y dispuso la imputacion de los causantes. En tal sentido, respecto de Steven Leonel HAUSCARRIAGUE, se dispuso su imputacion por los delitos de: “Robo Agravado, Atentado y Resistencia a la Autoridad y Amenazas Agravadas”. Asimismo, respecto de Ayrton TAYLOR, se dispuso la imputacion por el delito de: “Robo Agravado” tipificado en el Articulo 166 del CP y en referencia a Ricardo Javier RIOS, se dispuso su imputacion de oficio por los delitos de Robo Agravado y Resistencia a la Autoridad tipificado en el Art 166 y 239 del CP. Finalmente son entregados a la oficial de servicio en turno, a la sazon de la Oficial Subinspector Julieta SOSA quien cumplimentara las actuaciones judiciales y notificara separadamente de las causas que se le imputan Que no siendo para mas, se da por finalizada la presente, la cual previa lectura, es firmada y ratificada por los que en ella han intervenido.-  AMPLIACION: Habiendo ambos causantes mantenido audiencia a tenor del Art. 308 del C.P.P el Sr. Juez subrogante del Juzgado de Garantías Nro. 01 Dr. Nicolas LAMBERTI del Dpto. Judicial de Necochea dispone la inmediata detención tanto de HAUSCARRIAGUE como de TAYLOR, por lo que se solicita cupo de alojamiento en dependencia habilitada para tal fin designándose Cria. Primera de Necochea la que se efectivizará con fecha 20/06/2026 en horas de la mañana. Asimismo en el marco de orden de servicio 2643/2026 se efectivo orden de allanamiento en dos objetivos sito en calle Jauretche casa 9 y calle scalabrini Ortiz y curuchet con el fin de llevar a cabola detencion del ciudadano RIOS Ricardo Javier, arrojando resultado negativo. PU COP NRO. 178859/2026 - Se inicia PP 11-00-003707-26/00"                     </div>                 </div>             </div>             </div>`)[0];

 en el lugar, pero que dicho lote, se encontraba abierto hace ya unos 20 dias o un mes, ya que se estaria reparando el alambre perimetral y el alambrador se habria enfermado. Que al consultarle si posee sospechas, el mismo refiere que no, Que si posee camaras privadas, refiere que no, pero tiene conocimiento que en la esquina habria camaras pertenecientes a monitoreo local, las cuales seran pedidas. Que al momento de consultarle si posee placas fotograficas del elemento sustraido, el mismo refiere que no, dejando asentado que no es la primera vez que ingresan a su lote para hurtarle cosas. "                     </div>                 </div>             </div>             </div>`)[0];

                var html_d5d6cc9eac0b2a0336ef9a8a36d22741 = $(`<div id="html_d5d6cc9eac0b2a0336ef9a8a36d22741" style="width: 100.0%; height: 100.0%;">             <div style='font-family: Arial, sans-serif; width: 260px; color: #333;'>                 <h3 style='color: red; margin-bottom: 0; font-size: 16px;'>Información del Hecho</h3>                 <hr style='border: 0; border-top: 1px solid #ccc; margin: 5px 0 10px 0;'>                 <table style='width: 100%; font-size: 12px; border-collapse: collapse;'>                     <tr><td style='padding: 2px;'><b>Fecha:</b></td><td>2026-06-05</td></tr>                     <tr><td style='padding: 2px;'><b>Hora:</b></td><td>21:52:00</td></tr>                     <tr><td style='padding: 2px;'><b>Dirección:</b></td><td>MORENO 841</td></tr>                     <tr><td style='padding: 2px;'><b>Tipo:</b></td><td>S/D</td></tr>                 </table>                 <div style='margin-top: 10px;'>                     <b style='font-size: 12px;'>Detalle del Hecho:</b>                     <div style='margin-top: 5px; padding: 10px; border: 1px solid #aaa; background-color: #f9f9f9;                                  font-style: italic; font-size: 11px; max-height: 100px; overflow-y: auto; line-height: 1.4;'>                         "Que el dicente reside en el lugar antes consignado. Que en el dia de la fecha y siendo las 21:00 Horas en momentos en que arribo a la finca junto a su hijo Joaquin Maldonado, de 03 años de edad, momento en que advirtio que la ventana del frente que comunica al sector de la cocina se hallaba abierta de par en par, motivo por el cual al apersonarse noto en el sector de la cocina distintas huellas de barrio en el sector de la cocina, sin hallar desorden alguno, pero constatando el faltante de una garrafa de 10 Kg. De color rojizo o naranja desgastado, sin recordar marca de la misma, pero que se las vende el comercio (Despensa) en el comercio de Marcelo Peralta, como asi tambien el faltante de un telefono celular marca SAMSUMG modelo A15, de color celeste oscuro, con funda transparente en detalles en color marron, con la particularidad de poseer la pantalla en el lateral superior izquierdo se hallaba astillada, con abonado telefonico 2262 – 374352 de la empresa CLARO, elemento que se hallaba cargandose pode debajo del televisor, dejando el cargador suspendido en el aire. Que no constato demas faltantes, por lo que de inmediato dio aviso a la policia, manteniendo entrevista con un vecino que se encuentra en la parte trasera, mas bien del fondo del terreno, lugar donde reside el joven Miguel ECHARREN, quien le manifestara que horas antes se habian apersonado en su vivienda los hermanos Ricardo RIOS apodado “CHOCHO” y Leonel HAUSCARRIGUE y como Miguel se encontraban con otros amigos, decidieron echarlos por diferencias de peleas, motivo por el cual estos hermanos se retiraron, caminando por la casa del denunciante quienes les ingresaron por la ventana del frente y se retiraron con la garrafa a cuestas, todo ello advertido por el vecino Miguel ECHARREN, quien no los freno ni llamo a nadie porque no quiere mantener problemas para con los mismos, dado que los habia echado para evitar mas inconvenientes vecinales, pero sindicando como los autores del atraco en su vivienda. Que pudo advertir que los perpetradores le aflojaron una madera del marco de la ventana que se halla en precarias condiciones, introduciendo sus manos para abrir la traba interna, logrando abrir las ventanas sin efectuar daño alguno. Que valua lo sustraido en pesos Cuatrocientos Mil ($400.000) estimativamente. Que no posee seguro que ampare lo sustraido. Se prescinde de Policia Cientifica, por considerar que no se hallan rastros materiales y/o indicios vehementes para el esclarecimiento del presente, dejando constancia que al arribo del personal la ventana se encontraba cerrada y no se constato desorden alguno. Es todo lo que desea denunciar."                     </div>                 </div>                 var html_d270b67f836a36bd42f3298d6cd3c256 = $(`<div id="html_d270b67f836a36bd42f3298d6cd3c256" style="width: 100.0%; height: 100.0%;">             <div style='font-family: Arial, sans-serif; width: 260px; color: #333;'>                 <h3 style='color: red; margin-bottom: 0; font-size: 16px;'>Información del Hecho</h3>                 <hr style='border: 0; border-top: 1px solid #ccc; margin: 5px 0 10px 0;'>                 <table style='width: 100%; font-size: 12px; border-collapse: collapse;'>                     <tr><td style='padding: 2px;'><b>Fecha:</b></td><td>2026-06-19</td></tr>                     <tr><td style='padding: 2px;'><b>Hora:</b></td><td>20:40:00</td></tr>                     <tr><td style='padding: 2px;'><b>Dirección:</b></td><td>BELGRANO 50</td></tr>                     <tr><td style='padding: 2px;'><b>Tipo:</b></td><td>S/D</td></tr>                 </table>                 <div style='margin-top: 10px;'>                     <b style='font-size: 12px;'>Detalle del Hecho:</b>                     <div style='margin-top: 5px; padding: 10px; border: 1px solid #aaa; background-color: #f9f9f9;                                  font-style: italic; font-size: 11px; max-height: 100px; overflow-y: auto; line-height: 1.4;'>                         "Que el dicente refiere que resulta progenitor de joven Jesus Nahuel CARRAZANZA (15), el cual le menciona que en el dia de la fecha Viernes 19 de Junio del cte. año siendo las 20:20 Horas, le cuenta que en su Motovehiculo arribo a la casa de su progenitora en sito calle Belgrano Nro. 50 de este medio lugar donde es un albergue transitorio, que posee ingreso oscuro hacia el interior dejandola en lugar de estacionamiento. Que siendo las 20:40 aproximadamente el dicente refiere que sale caminando desde mencionado lugar hacia Avda. Mitre Esq Avenida Campos de este me dio a por fines de asistir a un kiosco que alli se emplaza a su regreso ya siendo las 20:59 Horas, al arribar al ingreso de la casa de madre constata que autores ignorados sustraen Motovehiculo Marca Zanella modelo ZB 110 cc, sin dominio colocado, numero de chasis 8ª6MBSCA4EC900684, numero de motor 1P52FMHD2013038: color negra, como caracteristica posee en cachas plasticas faltantes en frente y laterales, llanta delantera colo roja y negra, y asiento en malas condiciones en partes dañado: en regular estado de conservacion, la cual se encontraba sin llave de ignicion colocada, con traba volante colocado, con tanque de combustible lleno. Que preguntado si desde via publica se avistaba el rodado mismo refiere que NO. Que preguntado si posee camaras de seguridad refiere que no, que valua la sustraccion en $500.000 mil pesos aproximadamente. Que no posee problemas con ningun tipo de personas. Ninguna persona consulto por el rodado, es decir que haya tenido intenciones de adquirirla. El uso del Motovehiculo lo realizaba su hijo. No Sospechas. NO posee Seguro. Solo tiene en su poder Titulo del Motovehiculo. Es todo lo que tiene para denunciar.-"                     </div>                 </div>             </div>             </div>`)[0];

                var html_c2a775a0d3d8cbd4d146772dff90ade7 = $(`<div id="html_c2a775a0d3d8cbd4d146772dff90ade7" style="width: 100.0%; height: 100.0%;">             <div style='font-family: Arial, sans-serif; width: 260px; color: #333;'>                 <h3 style='color: red; margin-bottom: 0; font-size: 16px;'>Información del Hecho</h3>                 <hr style='border: 0; border-top: 1px solid #ccc; margin: 5px 0 10px 0;'>                 <table style='width: 100%; font-size: 12px; border-collapse: collapse;'>                     <tr><td style='padding: 2px;'><b>Fecha:</b></td><td>2026-06-20</td></tr>                     <tr><td style='padding: 2px;'><b>Hora:</b></td><td>19:44:00</td></tr>                     <tr><td style='padding: 2px;'><b>Dirección:</b></td><td>AV SAN MARTIN 50</td></tr>                     <tr><td style='padding: 2px;'><b>Tipo:</b></td><td>S/D</td></tr>                 </table>                 <div style='margin-top: 10px;'>                     <b style='font-size: 12px;'>Detalle del Hecho:</b>                     <div style='margin-top: 5px; padding: 10px; border: 1px solid #aaa; background-color: #f9f9f9;                                  font-style: italic; font-size: 11px; max-height: 100px; overflow-y: auto; line-height: 1.4;'>                         "Que en el Dia de la fecha a las 17:00 hs aproximadamente es anoticiado por el coordinador de inspectores, Tobal Adrian Gustavo, que hace unos instantes previos los inspectores de transito Arruti Lorena, Azcona Raul y Godoy Mariano, habian realizando un secuestro de un motovehiculo en calle Lisandro de la torre y Belgrano, el cual previo fue interceptado ya que el mismo no contaba con placa patente correctamente colocado por lo que el conductor se baja del rodado y la trata de llevarla a pie, siendo perseguido por personal de transito, donde advierten que el sujeto lanza el motovehiculo la deja tirada en el piso y se retira del lugar sin aportar datos alguno. Que en relacion a ello personal la carga a su rodado. Y atento a que el conductor no brindo ningun tipo de datos, sino que lanzo la moto en el piso y se retiro del lugar como se dijo anteriormente, solicitan colaboracion policial para la identificacion del sujeto aportando algunos datos. Que luego de ello el personal policial logra interceptar a este sujeto en av San Martin n° 70 aproximadamente de este medio, por lo que los inspectores se acercan al lugar. Que en interin comienza acercarse mas personas, donde uno de ellos familiar del infractor resultando ser Elias MALDONADO se pone muy nervioso, por lo que policia trata de calmarlo, momento que otro grupo se acerca a la camioneta donde se hallaba el rodado, la baja y se la lleva del lugar, sujeto este que no resulta ser el propietario o por lo menos el infractor. Todo sin autorizacion alguna por parte de los inspectores, quienes trataban que no se retire y contener. Que en relacion al infractor mismo refiere que posteriormente toma conocimiento que se trata de Lucas MALDONADO DNI N°48.790.486 datos aportados por personal policial. Que en relacion al motovehiculo secuestrado mismo refiere que se trata de motovehiculo 110 cc de color negro que desconoce mas datos pero adjunta videos donde se logra ver el rodado en cuestion. Que preguntado si posee numeracion de acta infraccionada mismo refiere que en este acto no, pero que adjuntara de ser necesario, dejando constancia que no se llego a la confeccion completa en virtud a lo ocurrido y en relacion a pasos legales que solicita el juzgado de Faltas intervinientes (datos del infractor y datos del rodado). Es cuanto desea denunciar. "                     </div>                 </div>             </div>             </div>`)[0];

ncontraba vacia, sin marca, la cual autores ignorados la sacan por el mismo lugar donde ingresan ya que las puertas de su vivienda se encontraban cerradas, y que ademas en la parte externa encuentra un balde dado vuelta debajo del ventiluz el cual utilizo para subirse para ingresar. Que a preguntas que se le formulan, refiere que posee sospechas de una persona a quien conoce como Leonel Hauscarriague, el cual en una oportunidad fue a su domicilio a cortar leña con su hermano e ingreso a la vivienda, y guardo la motosierra en la misma habitacion donde estaba la garrafa, por lo que este sujeto ya conocia el lugar. "                     </div>                 </div>             </div>             </div>`)[0];
